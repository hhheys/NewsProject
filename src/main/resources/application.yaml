spring:
  datasource:
    url: "jdbc:postgresql://localhost:5435/news_project"
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true
    baseline-version: 1_0_0
    schemas: public
    create-schemas: true
    default-schema: public